<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css?v=2" />
  <style>
    body { display: grid; place-items: center; overflow: auto; }
    .login-card {
      width: 380px; max-width: calc(100vw - 32px);
      background: var(--panel-solid); border: 1px solid var(--line);
      border-radius: 18px; box-shadow: var(--shadow); padding: 30px 26px;
    }
    .login-card .brand-lockup { justify-content: center; margin-bottom: 6px; }
    .login-card h1 { font-size: 20px; text-align: center; margin: 14px 0 4px; }
    .login-card p { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 22px; }
    .login-card label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; font-weight: 700; }
    .login-card input {
      width: 100%; background: var(--green-800); border: 1px solid var(--line); color: var(--text);
      border-radius: 11px; padding: 12px 14px; font-family: inherit; font-size: 15px;
    }
    .login-card input:focus { outline: none; border-color: var(--mint); }
    .login-card .err { background: rgba(179,70,58,.14); border: 1px solid var(--crit); color: #e79a90;
      border-radius: 10px; padding: 9px 12px; font-size: 13px; margin-bottom: 14px; text-align: center; }
    .login-card .submit { width: 100%; justify-content: center; margin-top: 18px; padding: 12px; font-size: 15px; }
  </style>
</head>
<body>
  <form class="login-card" method="post" action="/panel/login/">
    {% csrf_token %}
    <div class="brand-lockup">
      <img src="/static/img/logo.png" alt="أمانة العاصمة المقدسة" style="height:46px" />
    </div>
    <h1>لوحة التحكم</h1>
    <p>إدارة أصول النقل والبنية التحتية — محور طريق محمد بن سلمان</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label for="password">كلمة المرور</label>
    <input id="password" name="password" type="password" autofocus placeholder="••••••••" />
    <button class="btn primary submit" type="submit">🔓 دخول</button>
  </form>
</body>
</html>
